kind = "web"
previewPath = "/"
title = "Juice Box Studios"
version = "1.0.0"
id = "artifacts/juice-box-studios"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23996

[services.development]
run = "pnpm --filter @workspace/juice-box-studios run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/juice-box-studios", "run", "build" ]
publicDir = "artifacts/juice-box-studios/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23996"
BASE_PATH = "/"
